<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇家鋁材行動計算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-lg mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        <div class="bg-blue-600 p-4 text-white text-center">
            <h1 class="text-2xl font-bold">皇家鋁材報價系統</h1>
            <p class="text-sm opacity-80 mt-1">支援一般、精抽、圓管與切短料</p>
        </div>

        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">材料種類</label>
                <select id="mat-type" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-blue-500 focus:border-blue-500" onchange="toggleFields()">
                    <option value="round_general">圓條 (一般) - 預設外徑+0.2</option>
                    <option value="round_precision">圓條 (精抽) - 實際外徑</option>
                    <option value="tube">圓管 - 外徑+0.2計算</option>
                    <option value="short_cut">切短料 (一般) - 長度自動+5mm損耗</option>
                </select>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">尺寸/外徑 (mm)</label>
                    <input type="number" id="mat-size" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 10">
                </div>
                <div id="inner-size-container" class="hidden">
                    <label class="block text-sm font-medium mb-1">內徑 (mm)</label>
                    <input type="number" id="mat-inner-size" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 12">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1" id="label-length">長度 (mm)</label>
                    <input type="number" id="mat-length" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 1000">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">單價 (元/KG)</label>
                    <input type="number" id="mat-price" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 150">
                </div>
            </div>

            <div id="cut-fee-container" class="hidden mt-2 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                <label class="block text-sm font-bold text-blue-800 mb-1">單刀裁切代工費 (元) <span class="text-xs font-normal text-blue-600">支援小數點，如 1.5</span></label>
                <input type="number" id="mat-cut-fee" step="0.1" class="w-full border border-blue-300 rounded-lg p-2 focus:ring-blue-500" value="1">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">報價備註 (選填)</label>
                <textarea id="mat-remarks" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-blue-500 focus:border-blue-500" rows="2" placeholder="可輸入交期、公差要求或特殊包裝註記..."></textarea>
            </div>

            <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4">
                計算數值
            </button>
        </div>
    </div>

    <div id="quote-container" class="max-w-lg mx-auto mt-6 hidden">
        <p class="text-xs text-gray-500 mb-2 text-center">💡 左右滑動可預覽完整表格，點擊下方按鈕即可下載標準 PDF</p>
        
        <div id="scroll-wrapper" class="overflow-x-auto bg-white rounded-xl shadow-md border border-gray-200 mb-4">
            
            <div id="pdf-export-content" style="width: 700px; padding: 40px; background-color: #ffffff; font-family: 'Microsoft JhengHei', sans-serif; box-sizing: border-box;">
                <h2 style="text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px; color: #000;">皇家鋁材報價單</h2>
                <div style="text-align: right; margin-bottom: 15px; font-size: 14px; color: #333;">建立日期：<span id="pdf-date"></span></div>

                <table style="width: 100%; border-collapse: collapse; font-size: 16px; color: #000; border: 2px solid #000;">
                    <tr>
                        <th style="border: 1px solid #000; padding: 12px; background-color: #f3f4f6; width: 30%; text-align: center; font-weight: bold;">材料種類</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center;" id="pdf-type"></td>
                    </tr>
                    <tr>
                        <th style="border: 1px solid #000; padding: 12px; background-color: #f3f4f6; text-align: center; font-weight: bold;">外徑尺寸</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center;"><span id="pdf-size"></span> mm</td>
                    </tr>
                    <tr id="pdf-inner-row" style="display: none;">
                        <th style="border: 1px solid #000; padding: 12px; background-color: #f3f4f6; text-align: center; font-weight: bold;">內徑尺寸</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center;"><span id="pdf-inner"></span> mm</td>
                    </tr>
                    <tr>
                        <th id="pdf-length-label" style="border: 1px solid #000; padding: 12px; background-color: #f3f4f6; text-align: center; font-weight: bold;">需求長度</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center;"><span id="pdf-length"></span> mm <span id="pdf-length-note" style="color: #dc2626; font-size: 12px;"></span></td>
                    </tr>
                    <tr>
                        <th style="border: 1px solid #000; padding: 12px; background-color: #f3f4f6; text-align: center; font-weight: bold;">設定單價</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center;"><span id="pdf-price"></span> 元 / KG</td>
                    </tr>
                    
                    <tr id="pdf-cut-fee-row" style="display: none;">
                        <th style="border: 1px solid #000; padding: 12px; background-color: #e0f2fe; text-align: center; font-weight: bold; color: #0369a1;">單刀代工費</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center; font-weight: bold; color: #0369a1;"><span id="pdf-cut-fee"></span> 元</td>
                    </tr>

                    <tr>
                        <th id="pdf-weight-label" style="border: 1px solid #000; padding: 12px; background-color: #e5e7eb; text-align: center; font-weight: bold;">預估重量</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center; font-weight: bold; color: #1d4ed8;"><span id="pdf-weight"></span> KG</td>
                    </tr>
                    <tr>
                        <th id="pdf-total-label" style="border: 1px solid #000; padding: 12px; background-color: #e5e7eb; text-align: center; font-weight: bold;">總計金額</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center; font-weight: bold; color: #dc2626; font-size: 20px;"><span id="pdf-total"></span> 元</td>
                    </tr>

                    <tr id="pdf-3m-row" style="display: none;">
                        <th style="border: 1px solid #000; padding: 12px; background-color: #fef08a; text-align: center; font-weight: bold; color: #854d0e;">3米標準材試算</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: center; font-weight: bold; color: #854d0e; font-size: 18px;"><span id="pdf-3m-info"></span></td>
                    </tr>

                    <tr id="pdf-remarks-row" style="display: none;">
                        <th style="border: 1px solid #000; padding: 12px; background-color: #f3f4f6; text-align: center; font-weight: bold;">備註說明</th>
                        <td style="border: 1px solid #000; padding: 12px; text-align: left; color: #374151; white-space: pre-wrap;" id="pdf-remarks"></td>
                    </tr>
                </table>
            </div>
        </div>

        <button onclick="downloadPDF()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex justify-center items-center gap-2">
            下載正式 PDF 報價單
        </button>
    </div>

    <script>
        function toggleFields() {
            const type = document.getElementById('mat-type').value;
            const innerContainer = document.getElementById('inner-size-container');
            const lengthLabel = document.getElementById('label-length');
            const cutFeeContainer = document.getElementById('cut-fee-container');
            
            if (type === 'tube') {
                innerContainer.classList.remove('hidden');
            } else {
                innerContainer.classList.add('hidden');
                document.getElementById('mat-inner-size').value = '';
            }

            if (type === 'short_cut') {
                lengthLabel.innerText = "單塊淨長度 (mm) - 系統將自動+5";
                cutFeeContainer.classList.remove('hidden');
            } else {
                lengthLabel.innerText = "長度 (mm)";
                cutFeeContainer.classList.add('hidden');
            }
        }

        function calculate() {
            const typeSelect = document.getElementById('mat-type');
            const typeValue = typeSelect.value;
            const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' - ')[0];
            
            const size = parseFloat(document.getElementById('mat-size').value) || 0;
            const innerSize = parseFloat(document.getElementById('mat-inner-size').value) || 0;
            const lengthInput = parseFloat(document.getElementById('mat-length').value) || 0;
            const price = parseFloat(document.getElementById('mat-price').value) || 0;
            const cutFee = parseFloat(document.getElementById('mat-cut-fee').value) || 0;
            const remarks = document.getElementById('mat-remarks').value.trim();

            if (size === 0 || lengthInput === 0) {
                alert('請輸入正確的尺寸與長度數值！');
                return;
            }

            if (typeValue === 'tube' && size <= innerSize) {
                alert('防呆提示：圓管的「外徑」必須大於「內徑」，請重新輸入！');
                return;
            }

            let weight = 0;
            let finalLength = lengthInput;
            let lengthNote = "";
            const constant = 0.785 * 0.00273; 

            switch(typeValue) {
                case 'round_general':
                    weight = Math.pow(size + 0.2, 2) * constant * (finalLength / 1000);
                    break;
                case 'round_precision':
                    weight = Math.pow(size, 2) * constant * (finalLength / 1000);
                    break;
                case 'tube':
                    weight = (Math.pow(size + 0.2, 2) - Math.pow(innerSize, 2)) * constant * (finalLength / 1000);
                    break;
                case 'short_cut':
                    finalLength = lengthInput + 5;
                    weight = Math.pow(size + 0.2, 2) * constant * (finalLength / 1000);
                    lengthNote = "(含 5mm 切割損耗)";
                    break;
            }

            const pureMatPrice = weight * price;

            document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('zh-TW');
            document.getElementById('pdf-type').innerText = typeText;
            document.getElementById('pdf-size').innerText = size;
            document.getElementById('pdf-length').innerText = finalLength;
            document.getElementById('pdf-length-note').innerText = lengthNote;
            document.getElementById('pdf-price').innerText = price;
            document.getElementById('pdf-weight').innerText = weight.toFixed(4);

            if (typeValue === 'tube') {
                document.getElementById('pdf-inner-row').style.display = 'table-row';
                document.getElementById('pdf-inner').innerText = innerSize;
            } else {
                document.getElementById('pdf-inner-row').style.display = 'none';
            }

            if (typeValue === 'short_cut') {
                // 1. 先計算 (材料費 + 代工費)
                const rawUnitTotal = pureMatPrice + cutFee;
                
                // 2. 四捨五入到小數第一位 (例如: 8.658 -> 8.7)
                const roundedUnitTotal = Math.round(rawUnitTotal * 10) / 10;
                
                // 3. 隱藏的固定加給 0.1 元，並使用 toFixed 避免浮點數誤差 (變成 8.8)
                const finalUnitTotal = parseFloat((roundedUnitTotal + 0.1).toFixed(1));
                
                // 3米整支試算
                const piecesPer3M = Math.floor(3000 / finalLength);
                // 整支總報價維持四捨五入到整數
                const total3MPrice = Math.round(finalUnitTotal * piecesPer3M);

                document.getElementById('pdf-length-label').innerText = "單塊計算長度";
                document.getElementById('pdf-weight-label').innerText = "單塊預估重量";
                document.getElementById('pdf-total-label').innerText = "單塊總價 (材料+代工)";
                
                document.getElementById('pdf-cut-fee-row').style.display = 'table-row';
                document.getElementById('pdf-cut-fee').innerText = cutFee;

                document.getElementById('pdf-3m-row').style.display = 'table-row';
                document.getElementById('pdf-3m-info').innerText = `可切 ${piecesPer3M} 塊，整支總報價 ${total3MPrice.toLocaleString()} 元`;
                
                // 顯示單塊金額 (保留最多 1 位小數，精準顯示 8.8)
                document.getElementById('pdf-total').innerText = finalUnitTotal.toLocaleString('zh-TW', {minimumFractionDigits: 0, maximumFractionDigits: 1});
            } else {
                document.getElementById('pdf-length-label').innerText = "需求長度";
                document.getElementById('pdf-weight-label').innerText = "預估重量";
                document.getElementById('pdf-total-label').innerText = "總計金額";

                document.getElementById('pdf-cut-fee-row').style.display = 'none';
                document.getElementById('pdf-3m-row').style.display = 'none';
                
                document.getElementById('pdf-total').innerText = Math.round(pureMatPrice).toLocaleString();
            }

            // 處理備註欄位顯示
            if (remarks !== "") {
                document.getElementById('pdf-remarks-row').style.display = 'table-row';
                document.getElementById('pdf-remarks').innerText = remarks;
            } else {
                document.getElementById('pdf-remarks-row').style.display = 'none';
            }

            document.getElementById('quote-container').classList.remove('hidden');
        }

        function getFormattedDateString() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return `${yyyy}${mm}${dd}${hh}${min}`;
        }

        function downloadPDF() {
            const wrapper = document.getElementById('scroll-wrapper');
            const element = document.getElementById('pdf-export-content');
            
            const originalOverflow = wrapper.style.overflowX;
            wrapper.style.overflowX = 'visible';

            const fileName = `皇家鋁材報價單_${getFormattedDateString()}.pdf`;
            const opt = {
                margin:       [0.5, 0.5, 0.5, 0.5],
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2,           
                    useCORS: true,
                    scrollY: 0
                },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save().then(() => {
                wrapper.style.overflowX = originalOverflow;
            });
        }
    </script>
</body>
</html>
