<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋁材行動計算與報價系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-lg mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        <div class="bg-blue-600 p-4 text-white text-center">
            <h1 class="text-2xl font-bold">鋁材重量與報價計算機</h1>
            <p class="text-sm opacity-80 mt-1">支援一般、精抽、圓管與切短料</p>
        </div>

        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">材料種類</label>
                <select id="mat-type" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-blue-500 focus:border-blue-500" onchange="toggleFields()">
                    <option value="round_general">圓條 (一般) - 預設外徑+0.2</option>
                    <option value="round_precision">圓條 (精抽) - 實際外徑</option>
                    <option value="tube">圓管 - 外徑+0.2計算</option>
                    <option value="short_cut">切短料 (一般) - 長度自動+5mm損耗</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1">尺寸/外徑 (mm)</label>
                    <input type="number" id="mat-size" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 10">
                </div>
                <div id="inner-size-container" class="hidden">
                    <label class="block text-sm font-medium mb-1">內徑 (mm)</label>
                    <input type="number" id="mat-inner-size" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 12">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1" id="label-length">長度 (mm)</label>
                    <input type="number" id="mat-length" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 1000">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">單價 (元/KG)</label>
                    <input type="number" id="mat-price" class="w-full border border-gray-300 rounded-lg p-3" placeholder="例如: 150">
                </div>
            </div>

            <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4">
                計算數值
            </button>
        </div>
    </div>

    <div id="quote-container" class="max-w-lg mx-auto mt-6 hidden">
        <div class="bg-white p-6 rounded-xl shadow-md border-t-8 border-blue-600">
            <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">計算結果預覽</h2>
            
            <div class="space-y-2 text-gray-700 text-sm">
                <div class="flex justify-between border-b pb-2"><span>種類</span><span id="ui-type" class="font-medium"></span></div>
                <div class="flex justify-between border-b pb-2"><span>外徑</span><span class="font-medium"><span id="ui-size"></span> mm</span></div>
                <div class="flex justify-between border-b pb-2 hidden" id="ui-inner-row"><span>內徑</span><span class="font-medium"><span id="ui-inner"></span> mm</span></div>
                <div class="flex justify-between border-b pb-2"><span>長度</span><span class="font-medium"><span id="ui-length"></span> mm <span id="ui-length-note" class="text-xs text-red-500"></span></span></div>
                <div class="flex justify-between border-b pb-2"><span>單價</span><span class="font-medium"><span id="ui-price"></span> 元</span></div>
            </div>

            <div class="mt-4 p-4 bg-slate-50 rounded-lg">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-gray-600">重量</span>
                    <span class="text-lg font-bold text-blue-700" id="ui-weight"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-600">總金額</span>
                    <span class="text-xl font-bold text-red-600" id="ui-total"></span>
                </div>
            </div>
        </div>

        <button onclick="downloadPDF()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4 flex justify-center items-center gap-2">
            下載正式 PDF 報價單
        </button>
    </div>

    <div id="pdf-export-wrapper" style="position: absolute; left: -9999px; top: 0; width: 800px; background-color: white; padding: 40px; font-family: 'Microsoft JhengHei', sans-serif;">
        <h2 style="text-align: center; font-size: 32px; font-weight: bold; margin-bottom: 10px; color: #000;">鋁材報價單</h2>
        <div style="text-align: right; margin-bottom: 20px; font-size: 16px; color: #333;">建立日期：<span id="pdf-date"></span></div>
        
        <table style="width: 100%; border-collapse: collapse; font-size: 18px; color: #000;">
            <tr>
                <th style="border: 1px solid #000; padding: 15px; background-color: #f3f4f6; width: 30%; text-align: left;">材料種類</th>
                <td style="border: 1px solid #000; padding: 15px;" id="pdf-type"></td>
            </tr>
            <tr>
                <th style="border: 1px solid #000; padding: 15px; background-color: #f3f4f6; text-align: left;">外徑尺寸</th>
                <td style="border: 1px solid #000; padding: 15px;"><span id="pdf-size"></span> mm</td>
            </tr>
            <tr id="pdf-inner-row" style="display: none;">
                <th style="border: 1px solid #000; padding: 15px; background-color: #f3f4f6; text-align: left;">內徑尺寸</th>
                <td style="border: 1px solid #000; padding: 15px;"><span id="pdf-inner"></span> mm</td>
            </tr>
            <tr>
                <th style="border: 1px solid #000; padding: 15px; background-color: #f3f4f6; text-align: left;">需求長度</th>
                <td style="border: 1px solid #000; padding: 15px;"><span id="pdf-length"></span> mm <span id="pdf-length-note" style="color: #dc2626; font-size: 14px;"></span></td>
            </tr>
            <tr>
                <th style="border: 1px solid #000; padding: 15px; background-color: #f3f4f6; text-align: left;">設定單價</th>
                <td style="border: 1px solid #000; padding: 15px;"><span id="pdf-price"></span> 元 / KG</td>
            </tr>
            <tr>
                <th style="border: 1px solid #000; padding: 15px; background-color: #e5e7eb; text-align: left; font-weight: bold;">預估重量</th>
                <td style="border: 1px solid #000; padding: 15px; font-weight: bold; color: #1d4ed8;"><span id="pdf-weight"></span> KG</td>
            </tr>
            <tr>
                <th style="border: 1px solid #000; padding: 15px; background-color: #e5e7eb; text-align: left; font-weight: bold;">總計金額</th>
                <td style="border: 1px solid #000; padding: 15px; font-weight: bold; color: #dc2626; font-size: 24px;"><span id="pdf-total"></span> 元</td>
            </tr>
        </table>
    </div>

    <script>
        function toggleFields() {
            const type = document.getElementById('mat-type').value;
            const innerContainer = document.getElementById('inner-size-container');
            const lengthLabel = document.getElementById('label-length');
            
            if (type === 'tube') {
                innerContainer.classList.remove('hidden');
            } else {
                innerContainer.classList.add('hidden');
                document.getElementById('mat-inner-size').value = '';
            }

            if (type === 'short_cut') {
                lengthLabel.innerText = "切料長度 (mm) - 將自動+5";
            } else {
                lengthLabel.innerText = "長度 (mm)";
            }
        }

        function calculate() {
            const typeSelect = document.getElementById('mat-type');
            const typeValue = typeSelect.value;
            const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' - ')[0];
            
            const size = parseFloat(document.getElementById('mat-size').value) || 0;
            const innerSize = parseFloat(document.getElementById('mat-inner-size').value) || 0;
            const lengthInput = parseFloat(document.getElementById('mat-length').value) || 0;
            const price = parseFloat(document.getElementById('mat-price').value) || 0;

            if (size === 0 || lengthInput === 0) {
                alert('請輸入正確的尺寸與長度數值！');
                return;
            }

            let weight = 0;
            let finalLength = lengthInput;
            let lengthNote = "";
            const constant = 0.785 * 0.00273; 

            switch(typeValue) {
                case 'round_general':
                    weight = Math.pow(size + 0.2, 2) * constant * (finalLength / 1000);
                    break;
                case 'round_precision':
                    weight = Math.pow(size, 2) * constant * (finalLength / 1000);
                    break;
                case 'tube':
                    weight = (Math.pow(size + 0.2, 2) - Math.pow(innerSize, 2)) * constant * (finalLength / 1000);
                    break;
                case 'short_cut':
                    finalLength = lengthInput + 5;
                    weight = Math.pow(size + 0.2, 2) * constant * (finalLength / 1000);
                    lengthNote = "(含5mm損耗)";
                    break;
            }

            const totalPrice = weight * price;
            const formattedTotal = Math.round(totalPrice).toLocaleString();
            const formattedWeight = weight.toFixed(4);
            const currentDate = new Date().toLocaleDateString('zh-TW');

            // 1. 寫入網頁預覽 UI
            document.getElementById('ui-type').innerText = typeText;
            document.getElementById('ui-size').innerText = size;
            document.getElementById('ui-length').innerText = finalLength;
            document.getElementById('ui-length-note').innerText = lengthNote;
            document.getElementById('ui-price').innerText = price;
            document.getElementById('ui-weight').innerText = formattedWeight + " KG";
            document.getElementById('ui-total').innerText = formattedTotal + " 元";

            if (typeValue === 'tube') {
                document.getElementById('ui-inner-row').classList.remove('hidden');
                document.getElementById('ui-inner').innerText = innerSize;
            } else {
                document.getElementById('ui-inner-row').classList.add('hidden');
            }

            // 2. 寫入 PDF 專用隱藏表格
            document.getElementById('pdf-date').innerText = currentDate;
            document.getElementById('pdf-type').innerText = typeText;
            document.getElementById('pdf-size').innerText = size;
            document.getElementById('pdf-length').innerText = finalLength;
            document.getElementById('pdf-length-note').innerText = lengthNote;
            document.getElementById('pdf-price').innerText = price;
            document.getElementById('pdf-weight').innerText = formattedWeight;
            document.getElementById('pdf-total').innerText = formattedTotal;

            if (typeValue === 'tube') {
                document.getElementById('pdf-inner-row').style.display = 'table-row';
                document.getElementById('pdf-inner').innerText = innerSize;
            } else {
                document.getElementById('pdf-inner-row').style.display = 'none';
            }

            // 顯示預覽與下載按鈕
            document.getElementById('quote-container').classList.remove('hidden');
        }

        function getFormattedDateString() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return `${yyyy}${mm}${dd}${hh}${min}`;
        }

        // 下載 PDF (直接對隱藏的完美表格進行截圖)
        function downloadPDF() {
            const element = document.getElementById('pdf-export-wrapper');
            const fileName = `鋁材報價單_${getFormattedDateString()}.pdf`;

            const opt = {
                margin:       0.5,
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2,           
                    useCORS: true
                },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
