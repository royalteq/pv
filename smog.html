<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYAL皇家防霾紗窗估價單</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .info-row {
            display: flex;
            align-items: center;
        }
        .info-row label {
            width: 130px;
            font-weight: bold;
            flex-shrink: 0;
        }
        input[type="text"], input[type="number"], textarea {
            flex: 1;
            width: 100%;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .mobile-hint {
            display: none;
            color: #d9534f;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: right;
            font-weight: bold;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f0f0f0;
            white-space: nowrap;
        }
        td input[type="number"], td input[type="text"] {
            width: 100%;
            min-width: 60px;
        }
        .summary-section {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
            align-items: stretch;
        }
        .summary-box {
            width: 48%;
            display: flex;
            flex-direction: column;
        }
        .summary-box table {
            min-width: 100%;
            margin-bottom: 0;
            height: 100%;
        }
        .summary-box th {
            width: 40%;
            text-align: right;
            padding-right: 10px;
            vertical-align: middle;
        }
        .terms {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
        }
        .signature-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 40px;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .readonly {
            background-color: #e9ecef;
            border: 1px solid #ccc !important;
            font-weight: bold;
            color: #333;
        }

        /* ----- RWD 手機版設計 ----- */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 15px;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .mobile-hint {
                display: block; /* 在手機上顯示滑動提示 */
            }
            .summary-section {
                flex-direction: column;
            }
            .summary-box {
                width: 100%;
            }
            .signature-section {
                justify-content: center;
                margin-top: 30px;
            }
            button {
                width: 100%;
            }
        }

        /* ----- 列印時的樣式 (A4 最佳化) ----- */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .container {
                box-shadow: none;
                padding: 0;
                width: 100%;
                max-width: 100%;
            }
            .btn-container, .mobile-hint {
                display: none; /* 列印時隱藏按鈕與提示 */
            }
            input[type="text"], input[type="number"], textarea {
                border: none !important;
                background-color: transparent !important;
                padding: 0;
                resize: none;
            }
            .readonly {
                background-color: transparent !important;
            }
            .terms {
                background-color: transparent;
                padding: 0;
            }
            .table-responsive {
                overflow-x: visible;
            }
            table {
                min-width: 100%;
            }
            .info-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
            .summary-section {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
            }
            .summary-box {
                width: 48%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ROYAL皇家防霾紗窗估價單</h1>

    <div class="info-grid">
        <div class="info-row"><label>客戶姓名：</label><input type="text" id="cusName"></div>
        <div class="info-row"><label>施工地址：</label><input type="text" id="cusAddress"></div>
        <div class="info-row"><label>客戶電話：</label><input type="text" id="cusPhone"></div>
        <div class="info-row"><label>LINE ID&暱稱：</label><input type="text" id="cusLine"></div>
    </div>

    <div class="mobile-hint">👉 表格可左右滑動，輸入區已集中於左側</div>
    <div class="table-responsive">
        <table id="calcTable">
            <thead>
                <tr>
                    <th width="8%">項次</th>
                    <th width="15%">寬 (cm)</th>
                    <th width="15%">高 (cm)</th>
                    <th width="12%">數量</th>
                    <th width="15%">單價</th>
                    <th width="15%">才數</th>
                    <th width="20%">小計</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div class="summary-section">
        <div class="summary-box">
            <table>
                <tr>
                    <th>備註</th>
                    <td style="vertical-align: top;"><textarea id="note" placeholder="請在此輸入備註事項..."></textarea></td>
                </tr>
            </table>
        </div>
        <div class="summary-box">
            <table>
                <tr>
                    <th>平紗才數總計</th>
                    <td><input type="text" id="totalCai" class="readonly" readonly></td>
                </tr>
                <tr>
                    <th>未稅總計金額<br><span id="feeWarning" style="color:#d9534f; font-size:12px; font-weight:normal;"></span></th>
                    <td><input type="text" id="totalAmount" class="readonly" readonly></td>
                </tr>
                <tr>
                    <th>訂金 (5%)</th>
                    <td><input type="text" id="deposit" class="readonly" readonly></td>
                </tr>
                <tr>
                    <th>尾款</th>
                    <td><input type="text" id="balance" class="readonly" readonly></td>
                </tr>
            </table>
        </div>
    </div>

    <div class="terms">
        1. 丈量時寬、高各加20cm，做為施工必要面積，其餘損耗由本公司吸收。<br>
        2. 公司產品保固一年，若產品因非人為因素故障，將提供免費維修或更換服務。<br>
        3. 總價未滿8,000元，酌收1,500元車馬費。<br>
        4. 如同意施作，請先支付5%訂金。中國信託銀行 士林分行 戶名:黃偉倫 帳號:668530137306<br>
    </div>

    <div class="signature-section">
        客戶驗收合格。 客戶簽名：___________________
    </div>

    <div class="btn-container">
        <button onclick="printPDF()">列印 / 儲存為 PDF</button>
    </div>
</div>

<script>
    const ROW_COUNT = 10;
    const tbody = document.getElementById('tableBody');

    // 重新排序生成輸入框：寬 -> 高 -> 數量 -> 單價 -> 才數 -> 小計
    for (let i = 1; i <= ROW_COUNT; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${i}</td>
            <td><input type="number" id="w_${i}" oninput="calculate()"></td>
            <td><input type="number" id="h_${i}" oninput="calculate()"></td>
            <td><input type="number" id="q_${i}" oninput="calculate()"></td>
            <td><input type="number" id="price_${i}" oninput="calculate()"></td>
            <td><input type="text" id="cai_${i}" class="readonly" readonly tabindex="-1"></td>
            <td><input type="text" id="sub_${i}" class="readonly" readonly tabindex="-1"></td>
        `;
        tbody.appendChild(tr);
    }

    function calculate() {
        let totalCai = 0;
        let sumAmount = 0;

        for (let i = 1; i <= ROW_COUNT; i++) {
            let w = parseFloat(document.getElementById(`w_${i}`).value) || 0;
            let h = parseFloat(document.getElementById(`h_${i}`).value) || 0;
            let q = parseFloat(document.getElementById(`q_${i}`).value) || 0;
            let p = parseFloat(document.getElementById(`price_${i}`).value) || 0;

            let cai = 0;
            let subtotal = 0;

            if (w > 0 && h > 0 && q > 0) {
                let singleCai = ((w + 20) * (h + 20)) / 900;
                cai = (singleCai * q);
                totalCai += cai;
                
                if (p > 0) {
                    subtotal = Math.round(cai * p); 
                    sumAmount += subtotal;
                }
            }

            document.getElementById(`cai_${i}`).value = cai > 0 ? cai.toFixed(2) : '';
            document.getElementById(`sub_${i}`).value = subtotal > 0 ? subtotal : '';
        }

        let finalAmount = sumAmount;
        let feeWarning = document.getElementById('feeWarning');

        // 車馬費判斷，僅改變標題下方的提示文字，不覆寫使用者的備註
        if (sumAmount > 0 && sumAmount < 8000) {
            finalAmount += 1500;
            feeWarning.textContent = "(已加計1,500元車馬費)";
        } else {
            feeWarning.textContent = "";
        }

        let deposit = 0;
        let balance = 0;
        if (finalAmount > 0) {
            deposit = Math.round(finalAmount * 0.05);
            balance = finalAmount - deposit;
        }

        document.getElementById('totalCai').value = totalCai > 0 ? totalCai.toFixed(2) : '0';
        document.getElementById('totalAmount').value = finalAmount > 0 ? finalAmount : '0';
        document.getElementById('deposit').value = deposit > 0 ? deposit : '0';
        document.getElementById('balance').value = balance > 0 ? balance : '0';
    }

    function printPDF() {
        const cusName = document.getElementById('cusName').value;
        const defaultTitle = document.title;
        if (cusName) {
            document.title = `皇家防霾紗窗估價單_${cusName}`;
        }
        
        window.print();
        
        document.title = defaultTitle;
    }
</script>

</body>
</html>
